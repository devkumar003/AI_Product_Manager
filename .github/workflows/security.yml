name: Security Scanning (DevSecOps)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * 1' # Run every Monday at midnight

jobs:
  secret-scan:
    name: Secret Leak Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Trufflehog needs full history to scan commits

      - name: Scan Secrets with Trufflehog
        uses: trufflesecurity/trufflehog@v3.63.1
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  python-sast:
    name: Python SAST & Dependencies (Backend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Security Tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit

      - name: Run Bandit (Python Code SAST)
        # Scan for common security issues (SQL injection, hardcoded passwords, unsafe deserialization)
        run: |
          bandit -r backend/app -ll -ii

      - name: Run pip-audit (Python Dependency Scanning)
        # Audits python dependencies against the PyPI vulnerability database
        run: |
          pip-audit -r backend/requirements.txt

  node-sast:
    name: Node SAST & Dependencies (Frontend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run npm audit (Dependency Vulnerabilities)
        run: |
          cd frontend
          npm audit --audit-level=high

      - name: Run Semgrep (Multi-language SAST scan)
        uses: semgrep/semgrep-action@v1
        with:
          config: p/security-audit
