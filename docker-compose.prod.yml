services:
  db:
    image: postgres:16-alpine
    container_name: ai_product_db_prod
    restart: always
    env_file:
      - ./backend/.env
    # Do not expose 5432 to host in production for enhanced security
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - app-prod-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_product_os"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai_product_redis_prod
    restart: always
    command: redis-server --loglevel warning --requirepass ${REDIS_PASSWORD:-redis_secure_prod_pwd}
    # Do not expose 6379 to host in production for enhanced security
    volumes:
      - redis_prod_data:/data
    networks:
      - app-prod-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_product_backend_prod
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - ENVIRONMENT=production
      - POSTGRES_SERVER=db
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_secure_prod_pwd}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_prod_data:/app/uploads
    networks:
      - app-prod-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_product_frontend_prod
    restart: always
    env_file:
      - ./frontend/.env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-prod-network
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G

volumes:
  postgres_prod_data:
    driver: local
  redis_prod_data:
    driver: local
  uploads_prod_data:
    driver: local

networks:
  app-prod-network:
    driver: bridge
